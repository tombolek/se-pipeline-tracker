# Production docker-compose — runs on the EC2 instance.
# Start with: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No ports exposed — only reachable by the server container

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      AWS_REGION: ${AWS_REGION:-eu-west-1}
      APP_BACKUP_BUCKET: ${APP_BACKUP_BUCKET}
      BACKUP_BUCKET: ${BACKUP_BUCKET}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      FRONTEND_BUCKET: ${FRONTEND_BUCKET}
      CF_DISTRIBUTION_ID: ${CF_DISTRIBUTION_ID}
      DEPLOY_SHA: ${DEPLOY_SHA:-}
    volumes:
      - ./kb:/app/kb:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
